services:

  postgres-cyclo:
    image: postgres:16
    environment:
      POSTGRES_DB: cyclotrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-cyclo-data:/var/lib/postgresql/data
    networks:
      - cyclotrack-net
    restart: unless-stopped

  cyclo-api:
    build:
      context: ./back/CycloTrackApi
      dockerfile: CycloTrackApi.API/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres-cyclo;Database=cyclotrack;Username=postgres;Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: cyclotrack-api
      Jwt__Audience: cyclotrack-app
      Groq__ApiKey: ${GROQ_API_KEY}
      Spotify__ClientId: ${SPOTIFY_CLIENT_ID}
      Spotify__ClientSecret: ${SPOTIFY_CLIENT_SECRET}
      Spotify__CallbackUrl: ${SPOTIFY_CALLBACK_URL:-http://167.233.129.150:5002/spotify/callback}
    ports:
      - "${API_PORT:-5002}:8080"
    depends_on:
      - postgres-cyclo
    networks:
      - cyclotrack-net
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://167.233.129.150/cyclo-api}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - cyclo-api
    networks:
      - cyclotrack-net
    restart: unless-stopped

volumes:
  postgres-cyclo-data:

networks:
  cyclotrack-net:
    driver: bridge
